<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Bricks &mdash; LMarx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A0A0A;
      color: #FDF2F8;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 4px solid #EC4899;
      background: #0A0A0A;
      z-index: 10;
    }

    .brand {
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .brand span { color: #EC4899; }

    .controls {
      display: flex;
      gap: 10px;
    }

    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 16px;
      border: 4px solid #FDF2F8;
      background: transparent;
      color: #FDF2F8;
      cursor: pointer;
      transition: none;
    }
    .btn:hover {
      background: #EC4899;
      border-color: #EC4899;
      color: #0A0A0A;
    }
    .btn.active {
      background: #06B6D4;
      border-color: #06B6D4;
      color: #0A0A0A;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
    }
    #canvas-wrap canvas {
      display: block;
    }

    .hud {
      position: absolute;
      bottom: 16px;
      left: 20px;
      font-family: 'Space Grotesk', monospace;
      font-size: 0.8rem;
      color: #EC4899;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">Art <span>Bricks</span></div>
    <div class="controls">
      <button class="btn" id="btn-reset">Reset</button>
      <button class="btn" id="btn-add">+ Add 3</button>
    </div>
  </header>
  <div id="canvas-wrap"></div>
  <div class="hud" id="hud"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
