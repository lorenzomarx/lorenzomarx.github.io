<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashlight hover effect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <div class="light"></div>
    <div class="main">
      <div class="chart">

        <div class="row letters-row" style="--letter-size: clamp(5rem, 22vw, 15rem)">
          <span class="acuity">20/200</span>
          <span class="letters">G</span>
        </div>

        <div class="row letters-row" style="--letter-size: clamp(3.25rem, 14vw, 9rem)">
          <span class="acuity">20/100</span>
          <span class="letters">O F</span>
        </div>

        <div class="row letters-row" style="--letter-size: clamp(2.5rem, 11vw, 6.5rem)">
          <span class="acuity">20/70</span>
          <span class="letters">U C K</span>
        </div>

        <div class="row letters-row" style="--letter-size: clamp(2rem, 9vw, 5rem)">
          <span class="acuity">20/50</span>
          <span class="letters">E A C H</span>
        </div>

        <div class="row letters-row" style="--letter-size: clamp(1.6rem, 7.2vw, 4rem)">
          <span class="acuity">20/40</span>
          <span class="letters">O T H E R</span>
        </div>

        <div class="row marker-row">
          <span class="acuity">20/30</span>
          <span class="marker-line"></span>
        </div>

        <div class="row empty-row">
          <span class="acuity">20/25</span>
        </div>

        <div class="row empty-row">
          <span class="acuity">20/20</span>
        </div>

        <div class="row empty-row">
          <span class="acuity">20/15</span>
        </div>

        <div class="row empty-row">
          <span class="acuity">20/10</span>
        </div>

      </div>
    </div>

    <script src="./script.js"></script>
  </body>

</html>
