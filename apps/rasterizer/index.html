<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#FDF2F8">
    <link rel="shortcut icon" href="../../favicon.ico">
    <title>RASTERIZER</title>
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <nav class="brutal-nav">
        <a class="nav-back" href="../../index.html">&larr; HOME</a>
        <span class="nav-brand">RASTERIZER</span>
    </nav>

    <div class="bar" id="source-bar" role="tablist" aria-label="Source">
        <button type="button" class="active" data-source="image" aria-pressed="true">Image</button>
        <button type="button" data-source="camera" aria-pressed="false">Camera</button>
    </div>

    <div class="bar" id="style-bar" role="tablist" aria-label="Render style">
        <button type="button" class="active" data-style="dots" aria-pressed="true">Dots</button>
        <button type="button" data-style="squares" aria-pressed="false">Squares</button>
        <button type="button" data-style="horiz" aria-pressed="false">Horiz</button>
        <button type="button" data-style="diag" aria-pressed="false">Diag</button>
        <button type="button" data-style="ascii" aria-pressed="false">ASCII</button>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <section class="stage">
        <canvas id="canvas" aria-label="Rasterized output"></canvas>
        <div id="empty" class="empty">
            <span id="empty-text">Upload an image<br>or start the camera</span>
            <button type="button" id="enable-camera" class="btn enable-btn">Retry camera</button>
        </div>
    </section>

    <div class="controls">
        <div class="control-row">
            <span class="control-label">Intensity</span>
            <input type="range" id="intensity" class="slider" min="0.2" max="3" step="0.1" value="1" aria-label="Intensity">
            <span id="intensity-value" class="slider-value">1.0</span>
        </div>
        <div class="control-row">
            <button type="button" id="invert" class="toggle">Invert</button>
            <button type="button" id="colors" class="toggle">Use Colors</button>
            <button type="button" id="upload" class="btn">Upload Image</button>
            <button type="button" id="save" class="btn alt">Save PNG</button>
        </div>
    </div>

    <footer class="brutal-foot">
        <span class="mark">RASTERIZER<span class="dot">.</span></span>
        <a href="../../index.html">&larr; Home</a>
    </footer>

    <input type="file" id="file-input" accept="image/*" hidden>
    <video id="video" autoplay muted playsinline hidden></video>

    <script src="js/Rasterizer.js"></script>
</body>
</html>
